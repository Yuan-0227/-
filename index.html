<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>校园失物招领小程序 UI 交互演示</title>
  <style>
    :root {
      --bg: #edf4ff;
      --card: rgba(255, 255, 255, 0.86);
      --panel: rgba(255, 255, 255, 0.94);
      --line: rgba(116, 141, 198, 0.18);
      --text: #162136;
      --muted: #7c8aa4;
      --blue: #4f7df4;
      --cyan: #54c9ff;
      --orange: #ffad66;
      --green: #39bd8d;
      --red: #f35f70;
      --shadow: 0 22px 64px rgba(48, 78, 150, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 10% 8%, rgba(88, 132, 255, 0.20), transparent 32%),
        radial-gradient(circle at 90% 20%, rgba(84, 201, 255, 0.20), transparent 30%),
        linear-gradient(145deg, #edf4ff, #f8fbff 46%, #eef5ff);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .stage {
      width: 100%;
      margin: 0 auto;
      padding: 28px 20px 48px;
    }

    .phone {
      position: relative;
      max-width: 1180px;
      min-height: calc(100vh - 56px);
      margin: 0 auto;
    }

    .statusbar {
      display: none;
    }

    .signal {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .pill,
    .battery {
      display: block;
      border-radius: 999px;
      background: #1e293b;
      opacity: 0.8;
    }

    .pill {
      width: 14px;
      height: 8px;
    }

    .battery {
      width: 24px;
      height: 10px;
    }

    .navtop {
      position: sticky;
      top: 0;
      z-index: 12;
      min-height: 68px;
      margin-bottom: 14px;
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 126px 1fr 150px;
      gap: 14px;
      align-items: center;
      border: 1px solid rgba(116, 141, 198, 0.16);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(24px);
      box-shadow: 0 18px 50px rgba(48, 78, 150, 0.12);
    }

    .nav-title {
      text-align: center;
      font-size: 22px;
      font-weight: 900;
    }

    .round-btn,
    .menu-capsule {
      height: 34px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .round-btn {
      width: auto;
      min-width: 86px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
    }

    .menu-capsule {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid rgba(34, 48, 78, 0.12);
      color: var(--blue);
      font-size: 12px;
      font-weight: 900;
    }

    .menu-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--blue);
    }

    .view {
      min-height: 520px;
      padding: 0 0 48px;
      scroll-behavior: smooth;
    }

    .demo-banner {
      margin-bottom: 18px;
      padding: 14px 18px;
      border: 1px solid rgba(79, 125, 244, 0.18);
      border-radius: 22px;
      color: #315fcf;
      background: rgba(236, 245, 255, 0.86);
      font-size: 14px;
      font-weight: 850;
      line-height: 1.65;
    }

    .toast {
      position: fixed;
      left: 50%;
      top: 24px;
      z-index: 30;
      width: min(520px, calc(100vw - 40px));
      transform: translateX(-50%);
      display: none;
      padding: 12px 14px;
      border-radius: 18px;
      color: #1f6b50;
      background: rgba(232, 255, 246, 0.96);
      border: 1px solid rgba(57, 189, 141, 0.20);
      box-shadow: 0 16px 36px rgba(38, 108, 80, 0.14);
      font-size: 13px;
      font-weight: 800;
      text-align: center;
    }

    .toast.show {
      display: block;
    }

    .hero,
    .card,
    .item,
    .sheet {
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--card);
      box-shadow: 0 16px 42px rgba(54, 82, 150, 0.11);
      backdrop-filter: blur(18px);
    }

    .hero {
      position: relative;
      overflow: hidden;
      margin-bottom: 18px;
      padding: 34px 36px 32px;
      color: #fff;
      background:
        radial-gradient(circle at 86% 10%, rgba(255, 255, 255, 0.30), transparent 28%),
        linear-gradient(135deg, #335be6, #5285ff 55%, var(--cyan));
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(32px, 5vw, 54px);
      line-height: 1.18;
      letter-spacing: -0.04em;
    }

    .hero p {
      margin: 0;
      color: rgba(255, 255, 255, 0.86);
      font-size: 15px;
      line-height: 1.65;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 120px;
      gap: 12px;
      margin-top: 22px;
    }

    .hero-actions,
    .actions,
    .grid,
    .form-grid,
    .info-grid {
      display: grid;
      gap: 10px;
    }

    .hero-actions {
      grid-template-columns: 1fr 1fr;
      margin-top: 14px;
    }

    .btn {
      min-height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      color: var(--blue);
      background: rgba(255, 255, 255, 0.90);
      font-size: 14px;
      font-weight: 900;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.78);
    }

    .btn.primary {
      color: #fff;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      box-shadow: 0 12px 24px rgba(79, 125, 244, 0.22);
    }

    .btn.orange {
      color: #fff;
      background: linear-gradient(135deg, #ff9b4f, #ffc176);
    }

    .btn.green {
      color: #fff;
      background: linear-gradient(135deg, #32b984, #62d7ad);
    }

    .btn.red {
      color: #fff;
      background: linear-gradient(135deg, #ef5d6d, #ff8b98);
    }

    .btn.ghost {
      color: var(--muted);
      background: rgba(242, 247, 255, 0.90);
      border: 1px solid var(--line);
    }

    input,
    textarea,
    select {
      width: 100%;
      min-height: 42px;
      padding: 0 13px;
      border: 1px solid rgba(116, 141, 198, 0.20);
      border-radius: 16px;
      outline: none;
      color: var(--text);
      background: rgba(247, 250, 255, 0.92);
      font-size: 13px;
      font-weight: 700;
    }

    textarea {
      min-height: 92px;
      padding-top: 12px;
      line-height: 1.55;
      resize: none;
    }

    .card {
      margin-bottom: 18px;
      padding: 24px;
    }

    .section-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 24px;
      font-weight: 950;
    }

    .note {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      text-align: right;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .stat {
      padding: 22px 12px;
      border-radius: 20px;
      text-align: center;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(236, 245, 255, 0.88));
    }

    .stat strong {
      display: block;
      color: var(--blue);
      font-size: 34px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 900;
    }

    .tabs,
    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tabs {
      padding: 6px;
      border-radius: 20px;
      background: rgba(239, 245, 255, 0.86);
    }

    .tabs button {
      flex: 1;
      min-height: 38px;
      border-radius: 16px;
      color: var(--muted);
      background: transparent;
      font-size: 13px;
      font-weight: 900;
    }

    .tabs button.active {
      color: #fff;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      color: var(--muted);
      background: rgba(239, 245, 255, 0.88);
      font-size: 12px;
      font-weight: 900;
    }

    .chip.blue {
      color: #3f73ec;
      background: rgba(79, 125, 244, 0.12);
    }

    .chip.orange {
      color: #c8762c;
      background: rgba(255, 173, 102, 0.17);
    }

    .chip.green {
      color: #218d69;
      background: rgba(57, 189, 141, 0.15);
    }

    .chip.red {
      color: #cc4e5b;
      background: rgba(243, 95, 112, 0.14);
    }

    .list {
      display: grid;
      gap: 18px;
    }

    .item {
      position: relative;
      overflow: hidden;
      padding: 24px;
      background: var(--panel);
    }

    .item::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 5px;
      background: linear-gradient(90deg, var(--orange), #ffd08a);
    }

    .item.mine::before {
      background: linear-gradient(90deg, var(--blue), var(--cyan));
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .item h3 {
      margin: 10px 0 6px;
      font-size: 28px;
      line-height: 1.25;
      letter-spacing: -0.02em;
    }

    .item p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .info-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 12px;
    }

    .info-grid.two {
      grid-template-columns: 1fr 1fr;
    }

    .info {
      padding: 16px;
      border-radius: 16px;
      background: rgba(243, 248, 255, 0.92);
    }

    .info label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .info div {
      font-size: 16px;
      font-weight: 850;
      line-height: 1.45;
    }

    .actions {
      grid-template-columns: repeat(auto-fit, minmax(118px, 1fr));
      margin-top: 12px;
    }

    .form-grid {
      margin-top: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .field:has(textarea),
    .upload-box,
    .form-grid > .btn {
      grid-column: 1 / -1;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      font-size: 14px;
      font-weight: 900;
    }

    .required {
      color: var(--red);
    }

    .upload-box {
      min-height: 78px;
      padding: 12px;
      border: 1px dashed rgba(116, 141, 198, 0.38);
      border-radius: 18px;
      color: var(--muted);
      background: rgba(247, 250, 255, 0.72);
      font-size: 13px;
      font-weight: 800;
    }

    .file-name {
      margin-top: 8px;
      color: var(--blue);
      font-size: 12px;
      font-weight: 900;
    }

    .empty {
      padding: 34px 18px;
      border-radius: 24px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.76);
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.7;
    }

    .tabbar {
      position: sticky;
      top: 86px;
      z-index: 11;
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      padding: 8px;
      border: 1px solid rgba(116, 141, 198, 0.16);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.84);
      box-shadow: 0 14px 40px rgba(48, 78, 150, 0.10);
      backdrop-filter: blur(22px);
    }

    .tabbar button {
      flex: 1;
      min-height: 44px;
      border-radius: 16px;
      color: var(--muted);
      background: transparent;
      font-size: 15px;
      font-weight: 900;
    }

    .tabbar button.active {
      color: var(--blue);
      background: rgba(79, 125, 244, 0.10);
    }

    .tools {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      padding: 120px 20px 24px;
      background: rgba(15, 23, 42, 0.24);
      backdrop-filter: blur(8px);
    }

    .tools.show {
      display: block;
    }

    .sheet {
      width: min(560px, 100%);
      margin: 0 auto;
      padding: 24px;
      background: rgba(255, 255, 255, 0.96);
    }

    .sheet h2 {
      margin: 0 0 8px;
      font-size: 26px;
    }

    .sheet p {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .tool-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .identity-tip {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    @media (min-width: 900px) {
      .list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .hero .hero-actions,
      .hero .search-row {
        max-width: 760px;
      }
    }

    @media (max-width: 760px) {
      .stage {
        padding: 12px;
      }

      .navtop {
        grid-template-columns: 44px 1fr 112px;
        gap: 8px;
        padding: 10px;
        border-radius: 22px;
      }

      .round-btn {
        min-width: 38px;
        padding: 0;
      }

      .nav-title {
        font-size: 16px;
      }

      .menu-capsule {
        font-size: 12px;
      }

      .tabbar {
        top: 70px;
      }

      .hero {
        padding: 26px 20px 22px;
      }

      .search-row,
      .hero-actions,
      .stats,
      .info-grid,
      .form-grid {
        grid-template-columns: 1fr;
      }

      .item h3 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <section class="phone">
      <div class="statusbar">
        <span>9:35</span>
        <span class="signal"><i class="pill"></i><i class="battery"></i></span>
      </div>
      <header class="navtop">
        <button class="round-btn" id="backBtn">‹</button>
        <div class="nav-title" id="title">校园失物招领</div>
        <button class="menu-capsule" id="toolsBtn" aria-label="切换演示身份">
          <i class="menu-dot"></i><span>切换身份</span>
        </button>
      </header>
      <div class="toast" id="toast"></div>
      <nav class="tabbar" id="tabbar"></nav>
      <div class="demo-banner">静态网页交互演示：可以体验发布、搜索、详情、认领、我的记录和管理员审核流程；所有数据只保存在当前浏览器本地，不会上传服务器。</div>
      <section class="view" id="app"></section>
      <section class="tools" id="tools">
        <div class="sheet">
          <h2>切换演示身份</h2>
          <p>这里可以切换成“普通用户”或“管理员审核员”来完整体验流程。发布、审核、认领都只修改当前浏览器本地演示数据，不会上传到服务器。</p>
          <div class="tool-grid">
            <button class="btn primary" data-action="role" data-role="user">普通用户视角</button>
            <button class="btn orange" data-action="role" data-role="admin">管理员审核视角</button>
            <button class="btn ghost" data-action="reset">重置数据</button>
            <button class="btn ghost" data-action="closeTools">关闭</button>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'campus-ui-demo'
    const DATA_VERSION = '2026-04-23-static-web-v3'

    const seed = {
      records: [
        {
          id: 'r1',

        },
        {

          category: '电子产品',

          date: '2026-04-20',

          review: 'approved',
          status: 'open',
          views: 12,

        },
        {
          id: 'r3',
          owner: 'me',
          type: 'found',

          desc: '封面写有班级和姓名缩写。',
          category: '书籍资料',
          location: '图书馆自习区',
          date: '2026-04-19',
          contact: '微信：book_demo',
          review: 'approved',
          status: 'open',
          views: 0,
          imageName: ''
        },
        {
          id: 'r4',
          owner: 'me',
          type: 'lost',
          name: '校园卡',
          desc: '蓝色卡套，卡背面贴了课程表。',
          category: '证件',
          location: '教学楼 A 栋 201',
          date: '2026-04-18',
          contact: '微信：card_demo',
          review: 'approved',
          status: 'open',
          views: 5,
          imageName: ''
        },
        {
          id: 'r5',
          owner: 'me',
          type: 'lost',
          name: '雨伞',
          desc: '黑色折叠伞，伞柄有磨损。',
          category: '生活用品',
          location: '食堂二楼',
          date: '2026-04-17',
          contact: '手机号：13900000000',
          review: 'approved',
          status: 'completed',
          views: 6,
          imageName: ''
        },
        {
          id: 'r6',
          owner: 'other',
          type: 'found',
          name: '蓝牙鼠标',
          desc: '黑色无线鼠标，底部有磨损痕迹。',
          category: '电子产品',
          location: '实验楼 302',
          date: '2026-04-16',
          contact: '微信：mouse_demo',
          review: 'approved',
          status: 'open',
          views: 3,
          imageName: ''
        }
      ],
      claims: [
        {
          id: 'c1',
          recordId: 'r2',
          applicant: 'me',
          reason: '耳机壳侧边贴纸和我的一致，可以提供购买记录截图。',
          status: 'pending',
          proofName: '',
          createdAt: '2026-04-22 10:30'
        },
        {
          id: 'c2',
          recordId: 'r3',
          applicant: 'other',
          reason: '教材第一页写了我的姓名缩写，可以当面说明。',
          status: 'pending',
          proofName: '',
          createdAt: '2026-04-22 10:40'
        }
      ]
    }

    const state = {
      page: 'home',
      role: 'user',
      query: '',
      typeFilter: 'all',
      categoryFilter: 'all',
      publishType: 'lost',
      postFilter: 'all',
      claimTab: 'mine',
      adminTab: 'pending',
      selectedId: 'r2',
      editId: 'r1',
      claimId: 'r2',
      toolsOpen: false,
      records: [],
      claims: []
    }

    const titles = {
      home: '校园失物招领',
      search: '搜索',
      publish: '发布信息',
      detail: '信息详情',
      claim: '提交认领',
      my: '我的',
      posts: '我的发布',
      edit: '编辑信息',
      claims: '认领申请',
      admin: '管理后台'
    }

    const typeText = { lost: '失物', found: '招领' }
    const reviewText = { pending: '待审核', approved: '审核通过', rejected: '需修改' }
    const claimText = { pending: '待处理', approved: '已同意', rejected: '已拒绝' }

    function clone(data) {
      return JSON.parse(JSON.stringify(data))
    }

    function normalizeRecords(records) {
      return records.map((record) => ({
        ...record,
        owner: record.owner === 'other' ? 'other' : 'me',
        review: record.review || 'approved',
        status: record.status || 'open',
        views: Number(record.views || 0)
      }))
    }

    function loadData() {
      const saved = localStorage.getItem(STORAGE_KEY)
      if (saved) {
        try {
          const data = JSON.parse(saved)
          if (data.version === DATA_VERSION && Array.isArray(data.records) && Array.isArray(data.claims)) {
            state.records = normalizeRecords(data.records)
            state.claims = data.claims
            return
          }
        } catch (error) {
          localStorage.removeItem(STORAGE_KEY)
        }
      }
      state.records = clone(seed.records)
      state.claims = clone(seed.claims)
      saveData()
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        version: DATA_VERSION,
        records: state.records,
        claims: state.claims
      }))
    }

    function toast(text) {
      const el = document.getElementById('toast')
      el.textContent = text
      el.classList.add('show')
      window.clearTimeout(toast.timer)
      toast.timer = window.setTimeout(() => el.classList.remove('show'), 2400)
    }

    function go(page) {
      state.page = page
      state.toolsOpen = false
      render()
      document.getElementById('app').scrollTop = 0
    }

    function byId(id) {
      return state.records.find((record) => record.id === id)
    }

    function categories() {
      return ['all', ...Array.from(new Set(state.records.map((record) => record.category)))]
    }

    function visibleHomeRecords() {
      const keyword = state.query.trim().toLowerCase()
      return state.records.filter((record) => {
        if (record.review !== 'approved' || record.status === 'completed') return false
        if (state.typeFilter !== 'all' && record.type !== state.typeFilter) return false
        if (state.categoryFilter !== 'all' && record.category !== state.categoryFilter) return false
        return `${record.name}${record.desc}${record.location}${record.category}`.toLowerCase().includes(keyword)
      })
    }

    function canSeeContact(record) {
      if (!record) return false
      if (record.owner === 'me') return true
      return state.claims.some((claim) => claim.recordId === record.id && claim.applicant === 'me' && claim.status === 'approved')
    }

    function chip(text, tone = '') {
      return `<span class="chip ${tone}">${text}</span>`
    }

    function recordCard(record, mode = 'list') {
      const mine = record.owner === 'me'
      const typeTone = record.type === 'lost' ? 'orange' : 'blue'
      const reviewTone = record.review === 'approved' ? 'green' : record.review === 'rejected' ? 'red' : 'orange'
      const statusText = record.status === 'completed' ? '已完成' : record.type === 'lost' ? '寻找中' : '待认领'
      const statusTone = record.status === 'completed' ? 'green' : typeTone
      const actions = []

      if (mode !== 'detail') {
        actions.push(`<button class="btn primary" data-action="detail" data-id="${record.id}">查看详情</button>`)
      }

      if (mode === 'home' && record.type === 'found' && !mine) {
        actions.push(`<button class="btn ghost" data-action="claimStart" data-id="${record.id}">申请认领</button>`)
      }

      if (mode === 'posts') {
        actions.push(`<button class="btn ghost" data-action="editStart" data-id="${record.id}">编辑</button>`)
        if (record.status !== 'completed') actions.push(`<button class="btn green" data-action="completeRecord" data-id="${record.id}">标记完成</button>`)
      }

      if (mode === 'admin' && record.review === 'pending') {
        actions.unshift(`<button class="btn red" data-action="rejectRecord" data-id="${record.id}">驳回</button>`)
        actions.unshift(`<button class="btn green" data-action="approveRecord" data-id="${record.id}">通过</button>`)
      }

      if (mode === 'admin') {
        actions.push(`<button class="btn ghost" data-action="removeRecord" data-id="${record.id}">删除</button>`)
      }

      return `
        <article class="item ${mine ? 'mine' : ''}">
          <div class="item-top">
            <div class="chips">
              ${chip(mine ? '我的发布' : '他人发布', mine ? 'blue' : 'orange')}
              ${chip(typeText[record.type], typeTone)}
              ${chip(statusText, statusTone)}
              ${chip(reviewText[record.review], reviewTone)}
            </div>
            <span class="note">浏览 ${record.views}</span>
          </div>
          <h3>${record.name}</h3>
          <p>${record.desc}</p>
          <div class="info-grid">
            <div class="info"><label>分类</label><div>${record.category}</div></div>
            <div class="info"><label>地点</label><div>${record.location}</div></div>
            <div class="info"><label>时间</label><div>${record.date}</div></div>
          </div>
          ${record.imageName ? `<div class="file-name">本地选择图片：${record.imageName}</div>` : ''}
          ${actions.length ? `<div class="actions">${actions.join('')}</div>` : ''}
        </article>
      `
    }

    function renderHome() {
      const records = visibleHomeRecords()
      return `
        <section class="hero">
          <h1>发布更快，找回更准</h1>
          <p>先搜索，再发布；把线索集中到校园范围内处理。</p>
          <div class="search-row">
            <input id="homeQuery" value="${state.query}" placeholder="搜索物品名称、地点或分类" />
            <button class="btn primary" data-action="search">搜索</button>
          </div>
          <div class="hero-actions">
            <button class="btn" data-action="publishType" data-type="lost">发布失物</button>
            <button class="btn" data-action="publishType" data-type="found">发布招领</button>
          </div>
        </section>

        <section class="card">
          <div class="section-head">
            <h2>平台概览</h2>
            <span class="note">全部动态 · 全部分类</span>
          </div>
          <div class="stats">
            <div class="stat"><strong>${state.records.filter((r) => r.type === 'lost').length}</strong><span>失物发布</span></div>
            <div class="stat"><strong>${state.records.filter((r) => r.type === 'found').length}</strong><span>招领发布</span></div>
            <div class="stat"><strong>${state.records.filter((r) => r.status === 'completed').length}</strong><span>已完成</span></div>
          </div>
        </section>

        <section class="card">
          <div class="section-head">
            <h2>筛选</h2>
            <span class="note">按类型和分类查看</span>
          </div>
          <div class="grid" style="grid-template-columns: 1fr 1fr;">
            <select id="typeFilter">
              <option value="all" ${state.typeFilter === 'all' ? 'selected' : ''}>全部类型</option>
              <option value="lost" ${state.typeFilter === 'lost' ? 'selected' : ''}>失物</option>
              <option value="found" ${state.typeFilter === 'found' ? 'selected' : ''}>招领</option>
            </select>
            <select id="categoryFilter">
              ${categories().map((category) => `<option value="${category}" ${state.categoryFilter === category ? 'selected' : ''}>${category === 'all' ? '全部分类' : category}</option>`).join('')}
            </select>
          </div>
        </section>

        <section class="list">
          ${records.length ? records.map((record) => recordCard(record, 'home')).join('') : '<div class="empty">暂无符合条件的信息，可以先发布一条。</div>'}
        </section>
      `
    }

    function renderSearch() {
      return `
        <section class="card">
          <div class="section-head">
            <h2>搜索与筛选</h2>
            <span class="note">结果同步首页列表</span>
          </div>
          <div class="form-grid">
            <input id="searchQuery" value="${state.query}" placeholder="输入物品名称、地点、分类关键词" />
            <div class="grid" style="grid-template-columns: 1fr 1fr;">
              <select id="typeFilter"><option value="all" ${state.typeFilter === 'all' ? 'selected' : ''}>全部类型</option><option value="lost" ${state.typeFilter === 'lost' ? 'selected' : ''}>失物</option><option value="found" ${state.typeFilter === 'found' ? 'selected' : ''}>招领</option></select>
              <select id="categoryFilter">${categories().map((category) => `<option value="${category}" ${state.categoryFilter === category ? 'selected' : ''}>${category === 'all' ? '全部分类' : category}</option>`).join('')}</select>
            </div>
          </div>
        </section>
        <section class="list">${visibleHomeRecords().map((record) => recordCard(record, 'home')).join('') || '<div class="empty">暂无搜索结果</div>'}</section>
      `
    }

    function renderPublish() {
      return `
        <section class="hero">
          <h1>${state.publishType === 'lost' ? '发布失物' : '发布招领'}</h1>
          <p>填写清楚地点、时间和特征，提交后等待管理员审核。</p>
          <div class="hero-actions">
            <button class="btn ${state.publishType === 'lost' ? 'primary' : ''}" data-action="publishSwitch" data-type="lost">发布失物</button>
            <button class="btn ${state.publishType === 'found' ? 'primary' : ''}" data-action="publishSwitch" data-type="found">发布招领</button>
          </div>
        </section>
        <section class="card">
          <form id="publishForm" class="form-grid">
            <div class="field"><label><span class="required">*</span>物品名称</label><input name="name" required placeholder="例如：校园卡 / 耳机 / 教材" /></div>
            <div class="field"><label><span class="required">*</span>物品分类</label><select name="category"><option>电子产品</option><option>证件</option><option>书籍资料</option><option>生活用品</option><option>其他</option></select></div>
            <div class="field"><label><span class="required">*</span>地点</label><input name="location" required placeholder="例如：教学楼 A 栋" /></div>
            <div class="field"><label><span class="required">*</span>时间</label><input name="date" type="date" required value="2026-04-22" /></div>
            <div class="field"><label>物品描述</label><textarea name="desc" placeholder="颜色、特征、发现位置等"></textarea></div>
            <div class="field"><label><span class="required">*</span>联系方式</label><input name="contact" required placeholder="手机号或微信号，认领通过后才开放" /></div>
            <label class="upload-box">选择图片（本地预览，不上传服务器）<input name="image" type="file" accept="image/*" style="display:none" /></label>
            <button class="btn primary" type="submit">发布信息</button>
          </form>
        </section>
      `
    }

    function renderDetail() {
      const record = byId(state.selectedId) || visibleHomeRecords()[0] || state.records[0]
      if (!record) return '<div class="empty">暂无详情</div>'
      const contact = canSeeContact(record) ? record.contact : '认领通过后可见'
      const canClaim = record.type === 'found' && record.owner !== 'me' && record.review === 'approved' && record.status !== 'completed'
      return `
        ${recordCard(record, 'detail')}
        <section class="card">
          <div class="section-head"><h2>联系方式</h2><span class="note">隐私保护</span></div>
          <div class="info"><label>联系信息</label><div>${contact}</div></div>
          <p style="margin:12px 0 0;color:var(--muted);font-size:13px;line-height:1.7;">为避免私下联系，详情页先隐藏联系方式；提交认领申请并通过后才开放。</p>
          <div class="actions">
            ${canClaim ? `<button class="btn primary" data-action="claimStart" data-id="${record.id}">申请认领</button>` : ''}
            ${record.owner === 'me' ? `<button class="btn ghost" data-action="editStart" data-id="${record.id}">编辑信息</button>` : ''}
          </div>
        </section>
      `
    }

    function renderClaim() {
      const record = byId(state.claimId)
      if (!record) return '<div class="empty">请选择需要认领的信息</div>'
      return `
        <section class="card">
          <div class="section-head"><h2>认领对象</h2><span class="note">通过后开放联系方式</span></div>
          ${recordCard(record, 'detail')}
        </section>
        <section class="card">
          <form id="claimForm" class="form-grid">
            <div class="field"><label><span class="required">*</span>申请理由</label><textarea name="reason" required placeholder="说明能证明物品属于你的线索"></textarea></div>
            <label class="upload-box">选择证明图片（本地预览，不上传服务器）<input name="proof" type="file" accept="image/*" style="display:none" /></label>
            <button class="btn primary" type="submit">提交申请并查看进度</button>
          </form>
        </section>
      `
    }

    function renderRoleSwitchCard() {
      const isAdmin = state.role === 'admin'
      return `
        <section class="card">
          <div class="section-head">
            <h2>演示身份切换</h2>
            <span class="note">当前：${isAdmin ? '管理员审核员' : '普通用户'}</span>
          </div>
          <p class="identity-tip">交互演示分为两个角色：普通用户负责发布、认领和查看进度；管理员负责审核发布内容。</p>
          <div class="hero-actions">
            <button class="btn ${isAdmin ? 'ghost' : 'primary'}" data-action="role" data-role="user">普通用户视角</button>
            <button class="btn ${isAdmin ? 'orange' : 'ghost'}" data-action="role" data-role="admin">管理员审核视角</button>
          </div>
        </section>
      `
    }

    function renderMy() {
      const mine = state.records.filter((record) => record.owner === 'me')
      if (state.role === 'admin') {
        return `
          <section class="hero" style="background: radial-gradient(circle at 86% 10%, rgba(255,255,255,.3), transparent 28%), linear-gradient(135deg, #ff9b4f, #ffc176);">
            <h1>管理员工作台</h1>
            <p>审核发布内容、处理平台信息，保证首页展示内容质量。</p>
            <div class="hero-actions"><button class="btn" data-action="nav" data-page="admin">进入管理后台</button><button class="btn" data-action="role" data-role="user">切换为普通用户</button></div>
          </section>
          ${renderRoleSwitchCard()}
          <section class="card">
            <div class="stats">
              <div class="stat"><strong>${state.records.filter((r) => r.review === 'pending').length}</strong><span>待审核</span></div>
              <div class="stat"><strong>${state.records.length}</strong><span>总发布</span></div>
              <div class="stat"><strong>${state.records.filter((r) => r.status === 'completed').length}</strong><span>已完成</span></div>
            </div>
          </section>
        `
      }
      return `
        <section class="hero">
          <h1>我的找回工作台</h1>
          <p>这里聚焦发布、认领与个人记录，让常用操作更轻、更直达。</p>
          <div class="hero-actions"><button class="btn" data-action="publishType" data-type="lost">发布失物</button><button class="btn" data-action="publishType" data-type="found">发布招领</button></div>
        </section>
        ${renderRoleSwitchCard()}
        <section class="card">
          <div class="section-head"><h2>我的数据</h2><span class="note">点击查看对应记录</span></div>
          <div class="stats">
            <button class="stat" data-action="postsFilter" data-filter="lost"><strong>${mine.filter((r) => r.type === 'lost').length}</strong><span>失物发布</span></button>
            <button class="stat" data-action="postsFilter" data-filter="found"><strong>${mine.filter((r) => r.type === 'found').length}</strong><span>招领发布</span></button>
            <button class="stat" data-action="nav" data-page="claims"><strong>${state.claims.filter((c) => c.applicant === 'me').length}</strong><span>认领申请</span></button>
          </div>
        </section>
        <section class="card">
          <div class="section-head"><h2>我的发布状态</h2><span class="note">审核后会更新</span></div>
          <div class="list">
            <div class="info"><label>待审核</label><div>${mine.filter((r) => r.review === 'pending').length} 条</div></div>
            <div class="info"><label>展示中</label><div>${mine.filter((r) => r.review === 'approved' && r.status !== 'completed').length} 条</div></div>
            <div class="info"><label>已完成</label><div>${mine.filter((r) => r.status === 'completed').length} 条</div></div>
            <div class="info"><label>需修改</label><div>${mine.filter((r) => r.review === 'rejected').length} 条</div></div>
          </div>
        </section>
      `
    }

    function renderPosts() {
      let records = state.records.filter((record) => record.owner === 'me')
      if (state.postFilter !== 'all') {
        records = records.filter((record) => record.type === state.postFilter || record.review === state.postFilter)
      }
      return `
        <section class="card">
          <div class="section-head"><h2>我的发布</h2><span class="note">可编辑 / 标记完成</span></div>
          <select id="postFilter">
            <option value="all" ${state.postFilter === 'all' ? 'selected' : ''}>全部记录</option>
            <option value="lost" ${state.postFilter === 'lost' ? 'selected' : ''}>失物</option>
            <option value="found" ${state.postFilter === 'found' ? 'selected' : ''}>招领</option>
            <option value="pending" ${state.postFilter === 'pending' ? 'selected' : ''}>待审核</option>
            <option value="approved" ${state.postFilter === 'approved' ? 'selected' : ''}>审核通过</option>
            <option value="rejected" ${state.postFilter === 'rejected' ? 'selected' : ''}>需修改</option>
          </select>
        </section>
        <section class="list">${records.map((record) => recordCard(record, 'posts')).join('') || '<div class="empty">暂无记录</div>'}</section>
      `
    }

    function renderEdit() {
      const record = byId(state.editId)
      if (!record) return '<div class="empty">没有找到要编辑的记录</div>'
      return `
        <section class="card">
          <form id="editForm" class="form-grid">
            <div class="field"><label>物品名称</label><input name="name" required value="${record.name}" /></div>
            <div class="field"><label>物品分类</label><select name="category">${['电子产品', '证件', '书籍资料', '生活用品', '其他'].map((c) => `<option ${record.category === c ? 'selected' : ''}>${c}</option>`).join('')}</select></div>
            <div class="field"><label>地点</label><input name="location" required value="${record.location}" /></div>
            <div class="field"><label>时间</label><input name="date" type="date" required value="${record.date}" /></div>
            <div class="field"><label>物品描述</label><textarea name="desc">${record.desc}</textarea></div>
            <div class="field"><label>联系方式</label><input name="contact" required value="${record.contact}" /></div>
            <button class="btn primary" type="submit">保存修改并重新审核</button>
          </form>
        </section>
      `
    }

    function renderClaims() {
      const mine = state.claims.filter((claim) => claim.applicant === 'me')
      const received = state.claims.filter((claim) => {
        const record = byId(claim.recordId)
        return record && record.owner === 'me'
      })
      const list = state.claimTab === 'mine' ? mine : received
      return `
        <section class="card">
          <div class="tabs">
            <button class="${state.claimTab === 'mine' ? 'active' : ''}" data-action="claimTab" data-tab="mine">我的申请</button>
            <button class="${state.claimTab === 'received' ? 'active' : ''}" data-action="claimTab" data-tab="received">收到的申请</button>
          </div>
        </section>
        <section class="list">${list.map(renderClaimCard).join('') || '<div class="empty">暂无申请</div>'}</section>
      `
    }

    function renderClaimCard(claim) {
      const record = byId(claim.recordId)
      const tone = claim.status === 'approved' ? 'green' : claim.status === 'rejected' ? 'red' : 'orange'
      const received = state.claimTab === 'received'
      return `
        <article class="item">
          <div class="chips">${chip(claimText[claim.status], tone)}${record ? chip(record.name, 'blue') : ''}</div>
          <h3>${received ? '收到的认领申请' : '我的认领申请'}</h3>
          <p>${claim.reason}</p>
          <div class="info-grid">
            <div class="info"><label>提交时间</label><div>${claim.createdAt}</div></div>
            <div class="info"><label>联系方式</label><div>${claim.status === 'approved' && record ? record.contact : '未通过前不可见'}</div></div>
          </div>
          ${claim.proofName ? `<div class="file-name">本地证明图片：${claim.proofName}</div>` : ''}
          ${received && claim.status === 'pending' ? `<div class="actions"><button class="btn red" data-action="rejectClaim" data-id="${claim.id}">拒绝</button><button class="btn green" data-action="approveClaim" data-id="${claim.id}">同意</button></div>` : ''}
        </article>
      `
    }

    function renderAdmin() {
      const pending = state.records.filter((record) => record.review === 'pending')
      const records = state.adminTab === 'pending' ? pending : state.records
      return `
        <section class="hero" style="background: radial-gradient(circle at 86% 10%, rgba(255,255,255,.3), transparent 28%), linear-gradient(135deg, #ff9b4f, #ffc176);">
          <h1>管理后台</h1>
          <p>审核发布内容，管理平台信息，审核结果会同步到用户端。</p>
        </section>
        <section class="card">
          <div class="stats">
            <div class="stat"><strong>${pending.length}</strong><span>待审核</span></div>
            <div class="stat"><strong>${state.records.length}</strong><span>总发布</span></div>
            <div class="stat"><strong>${state.records.filter((r) => r.status === 'completed').length}</strong><span>已完成</span></div>
          </div>
        </section>
        <section class="card">
          <div class="tabs">
            <button class="${state.adminTab === 'pending' ? 'active' : ''}" data-action="adminTab" data-tab="pending">审核队列</button>
            <button class="${state.adminTab === 'all' ? 'active' : ''}" data-action="adminTab" data-tab="all">全部内容</button>
          </div>
        </section>
        <section class="list">${records.map((record) => recordCard(record, 'admin')).join('') || '<div class="empty">暂无需要处理的内容</div>'}</section>
      `
    }

    function bindInputs() {
      const q1 = document.getElementById('homeQuery')
      const q2 = document.getElementById('searchQuery')
      ;[q1, q2].forEach((input) => {
        if (input) input.addEventListener('input', (event) => {
          state.query = event.target.value
          render()
        })
      })

      const type = document.getElementById('typeFilter')
      if (type) type.addEventListener('change', (event) => {
        state.typeFilter = event.target.value
        render()
      })

      const category = document.getElementById('categoryFilter')
      if (category) category.addEventListener('change', (event) => {
        state.categoryFilter = event.target.value
        render()
      })

      const postFilter = document.getElementById('postFilter')
      if (postFilter) postFilter.addEventListener('change', (event) => {
        state.postFilter = event.target.value
        render()
      })
    }

    function render() {
      const views = {
        home: renderHome,
        search: renderSearch,
        publish: renderPublish,
        detail: renderDetail,
        claim: renderClaim,
        my: renderMy,
        posts: renderPosts,
        edit: renderEdit,
        claims: renderClaims,
        admin: renderAdmin
      }

      document.getElementById('title').textContent = titles[state.page] || '校园失物招领'
      document.getElementById('backBtn').style.visibility = state.page === 'home' ? 'hidden' : 'visible'
      document.getElementById('app').innerHTML = (views[state.page] || renderHome)()
      document.getElementById('tabbar').innerHTML = renderTabbar()
      document.getElementById('tools').classList.toggle('show', state.toolsOpen)
      bindInputs()
    }

    function renderTabbar() {
      const active = state.page === 'publish' ? 'publish' : ['my', 'posts', 'edit', 'claims', 'admin'].includes(state.page) ? 'my' : 'home'
      return `
        <button class="${active === 'home' ? 'active' : ''}" data-action="nav" data-page="home">首页</button>
        <button class="${active === 'publish' ? 'active' : ''}" data-action="nav" data-page="publish">发布</button>
        <button class="${active === 'my' ? 'active' : ''}" data-action="nav" data-page="my">我的</button>
      `
    }

    document.addEventListener('click', (event) => {
      const target = event.target.closest('[data-action]')
      if (!target) return
      const action = target.dataset.action
      const id = target.dataset.id

      if (action === 'nav') go(target.dataset.page)
      if (action === 'search') go('search')
      if (action === 'publishType') {
        state.publishType = target.dataset.type
        go('publish')
      }
      if (action === 'publishSwitch') {
        state.publishType = target.dataset.type
        render()
      }
      if (action === 'detail') {
        state.selectedId = id
        const record = byId(id)
        if (record) record.views += 1
        saveData()
        go('detail')
      }
      if (action === 'claimStart') {
        state.claimId = id
        go('claim')
      }
      if (action === 'editStart') {
        state.editId = id
        go('edit')
      }
      if (action === 'postsFilter') {
        state.postFilter = target.dataset.filter
        go('posts')
      }
      if (action === 'completeRecord') {
        const record = byId(id)
        if (record) {
          record.status = 'completed'
          saveData()
          toast('已标记完成，首页不再展示')
          render()
        }
      }
      if (action === 'approveRecord' || action === 'rejectRecord') {
        const record = byId(id)
        if (record) {
          record.review = action === 'approveRecord' ? 'approved' : 'rejected'
          saveData()
          toast(action === 'approveRecord' ? '审核通过，用户端可见' : '已驳回，用户端显示需修改')
          render()
        }
      }
      if (action === 'removeRecord') {
        state.records = state.records.filter((record) => record.id !== id)
        state.claims = state.claims.filter((claim) => claim.recordId !== id)
        saveData()
        toast('已从演示数据中删除')
        render()
      }
      if (action === 'claimTab') {
        state.claimTab = target.dataset.tab
        render()
      }
      if (action === 'approveClaim' || action === 'rejectClaim') {
        const claim = state.claims.find((entry) => entry.id === id)
        if (claim) {
          claim.status = action === 'approveClaim' ? 'approved' : 'rejected'
          const record = byId(claim.recordId)
          if (record && action === 'approveClaim') record.status = 'completed'
          saveData()
          toast(action === 'approveClaim' ? '已同意认领，联系方式开放' : '已拒绝认领，联系方式隐藏')
          render()
        }
      }
      if (action === 'adminTab') {
        state.adminTab = target.dataset.tab
        render()
      }
      if (action === 'role') {
        state.role = target.dataset.role
        go(state.role === 'admin' ? 'admin' : 'home')
        toast(state.role === 'admin' ? '已切换为管理员演示' : '已切换为用户演示')
      }
      if (action === 'reset') {
        localStorage.removeItem(STORAGE_KEY)
        state.records = clone(seed.records)
        state.claims = clone(seed.claims)
        state.toolsOpen = false
        saveData()
        go('home')
        toast('演示数据已重置')
      }
      if (action === 'closeTools') {
        state.toolsOpen = false
        render()
      }
    })

    document.addEventListener('submit', (event) => {
      event.preventDefault()
      const form = event.target
      const data = Object.fromEntries(new FormData(form).entries())

      if (form.id === 'publishForm') {
        const file = form.elements.image.files[0]
        state.records.unshift({
          id: `r${Date.now()}`,
          owner: 'me',
          type: state.publishType,
          name: data.name,
          desc: data.desc || '用户补充的物品描述。',
          category: data.category,
          location: data.location,
          date: data.date,
          contact: data.contact,
          review: 'pending',
          status: 'open',
          views: 0,
          imageName: file ? file.name : ''
        })
        state.postFilter = 'pending'
        saveData()
        go('posts')
        toast('发布成功，已进入待审核')
      }

      if (form.id === 'editForm') {
        const record = byId(state.editId)
        if (record) {
          Object.assign(record, {
            name: data.name,
            desc: data.desc,
            category: data.category,
            location: data.location,
            date: data.date,
            contact: data.contact,
            review: 'pending'
          })
          state.postFilter = 'pending'
          saveData()
          go('posts')
          toast('修改已保存，重新进入待审核')
        }
      }

      if (form.id === 'claimForm') {
        const file = form.elements.proof.files[0]
        const exists = state.claims.some((claim) => claim.recordId === state.claimId && claim.applicant === 'me')
        if (!exists) {
          state.claims.unshift({
            id: `c${Date.now()}`,
            recordId: state.claimId,
            applicant: 'me',
            reason: data.reason,
            status: 'pending',
            proofName: file ? file.name : '',
            createdAt: '刚刚'
          })
          toast('认领申请已提交')
        } else {
          toast('你已经提交过这条认领申请')
        }
        state.claimTab = 'mine'
        saveData()
        go('claims')
      }
    })

    document.getElementById('toolsBtn').addEventListener('click', () => {
      state.toolsOpen = true
      render()
    })

    document.getElementById('backBtn').addEventListener('click', () => {
      const fallback = {
        search: 'home',
        publish: 'home',
        detail: 'home',
        claim: 'detail',
        posts: 'my',
        edit: 'posts',
        claims: 'my',
        admin: 'my'
      }
      go(fallback[state.page] || 'home')
    })

    loadData()
    render()
  </script>
</body>
</html>
